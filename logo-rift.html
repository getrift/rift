<!doctype html><html><head><meta charset="utf-8"><style>
  :root{--bg:#08080a;--muted:#8a8a93}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:#ededf0;font-family:"Geist",Inter,ui-sans-serif,system-ui}
  .wrap{max-width:1120px;margin:0 auto;padding:56px 32px 96px}
  h1{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:0 0 24px}
  .sub{margin:48px 0 18px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .lock{display:grid;grid-template-columns:1fr 1fr;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
  .cell{display:flex;align-items:center;gap:24px;padding:60px 56px}
  .dark{background:#0b0b0d}.light{background:#f4f4f5}
  .word{font-weight:600;font-size:62px;letter-spacing:-.045em;line-height:1}
  .dark .word{color:#fff}.light .word{color:#0b0b0d}
  .dark .mk{color:#fff}.light .mk{color:#0b0b0d}
  .icons{display:flex;gap:28px;align-items:flex-end;flex-wrap:wrap}
  .tile{display:flex;flex-direction:column;align-items:center;gap:12px}
  .tile .t{font-size:11px;color:var(--muted)}
  .app{width:104px;height:104px;border-radius:24px;display:flex;align-items:center;justify-content:center}
  .appD{background:#0b0b0d;border:1px solid rgba(255,255,255,.08);color:#fff}
  .appL{background:#f4f4f5;color:#0b0b0d}
  .chip{display:flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:14px;background:#0b0b0d;border:1px solid rgba(255,255,255,.08);color:#fff}
  svg{display:block;overflow:visible}
</style></head><body><div class="wrap">
<h1>Rift — B · smooth bloom (locked)</h1>

<div class="lock">
  <div class="cell dark"  id="lockDark"></div>
  <div class="cell light" id="lockLight"></div>
</div>

<div class="sub">App icon</div>
<div class="icons" id="apps"></div>

<div class="sub">Favicon · pixel test</div>
<div class="icons" id="favs"></div>

<script>
const B=[[.26,.5,.82,1],[.18,.34,.66,.9],[.14,.22,.42,.58],[.12,.15,.22,.3]];
function memGrid(M,{cell=7,gap=2,start=7}={}){
  let s="";
  for(let r=0;r<M.length;r++)for(let c=0;c<M[r].length;c++){
    const x=start+c*(cell+gap), y=start+r*(cell+gap);
    s+=`<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${cell}" height="${cell}" rx="1.5" fill="currentColor" opacity="${M[r][c]}"/>`;
  }
  return s;
}
const G=memGrid(B);
const mk=(size)=>`<svg class="mk" width="${size}" height="${size}" viewBox="0 0 48 48">${G}</svg>`;
const word="<span class='word'>Rift</span>";

lockDark.innerHTML  = mk(64)+word;
lockLight.innerHTML = mk(64)+word;

apps.innerHTML =
  `<div class="tile"><div class="app appD">${mk(72)}</div><span class="t">dark · 104</span></div>`+
  `<div class="tile"><div class="app appL">${mk(72)}</div><span class="t">light · 104</span></div>`;

favs.innerHTML =
  `<div class="tile"><div class="chip">${mk(40)}</div><span class="t">40</span></div>`+
  `<div class="tile"><div class="chip">${mk(32)}</div><span class="t">32</span></div>`+
  `<div class="tile"><div class="chip">${mk(16)}</div><span class="t">16</span></div>`;
</script>
</div></body></html>
